<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Аэрологическая диаграмма. Бир.</title>
    <script src="{{ url_for('static', filename='js/d3.v7.min.js')}}"></script>
    <link rel="stylesheet" href="static/css/slider.css">
    <link rel="stylesheet" href="static/css/page.css">
    <style>
        svg { background: #ffffff; }
            /*.grid-line { stroke: #ddd; stroke-width: 0.5; }*/
            .pressureLines { stroke: #555; stroke-dasharray: 2,2; }
            .isoterm { stroke: #a96d42; stroke-width: 0.5px; fill: none; }
            .dry-adiabat { stroke: #c21134; stroke-width: 0.5px; fill: none; }  /* Коричневый */
            .moist-adiabat { stroke: #1e90ff; stroke-dasharray: 5,5; stroke-width: 0.5px; fill: none; } /* Синий */
            .mixing-ratio { stroke: #32cd32; }  /* Зелёный */

        .gridline, .tempzero {
            stroke: #0a0a09;
            stroke-width: 0.5px;
            fill: none;
        }
        .tempzero { stroke: #aaa; stroke-width: 1.25px; }

        .arrow {
            fill: none;
            stroke: black;
            stroke-width: 2;
        }


        #windbarbs{
            width: 100%;
            height: 100%;
            background: black;
        }
  
  
        @media screen and (min-width: 992px) {
            #barbs {
                width: 8%;
                height: 80vh;
                margin-top: 0px;
        }

        table {
            width:100%;
            height:100%;
            font-size: 1.1em;
        }

        tr, td {
            font-family: "Helvetica";
            border: 1px solid black;
            background: #1A1A1A;
            text-align: right;
            padding-right: 10px;
            color: white;
        }

        th {
            padding-right: 10px;
            color: #cccccc;
        }

        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
  }
  
  /* Точки на треке (псевдоэлемент) */

.slider-track-markers {
    position: absolute;      /* Добавь */
    top: 50%;                /* Добавь — центрируем */
    left: 0;                 /* Добавь */
    right: 0;                /* Добавь */
    transform: translateY(-50%);  /* Добавь — точное выравнивание */
    pointer-events: none;    /* Добавь, чтобы кликать сквозь точки */
    width: 100%;             /* Оставь или убери, если есть left/right */
}

.track-marker {
    position: absolute;
    width: 6px;
    height: 16px;
    background: black;
    border-radius: 50%;
    transform: translateX(-50%);  /* Убери translateY, если он есть */
    /* Если точки всё ещё ниже, добавь: */
    top: -38px;   /* Подними вручную */
}


    </style>
</head>
<body>
    <div class="diagram-card">
        <!-- Верхний блок: заголовок + кнопка выбора спота -->
        <div class="header">
            <div class="title-section">
                <h1>Аэрологическая диаграмма. {{ spot.title }}</h1>
                <div class="sub">
                    <span>📡 GFS, данные от 0 часов 05.03.2026</span>
                </div>
            </div>
            <div class="spot-btn-wrapper" id="spotWrapper">
                <button class="spot-button" id="spotToggleBtn" aria-label="Выбрать спот">
                    <span class="spot-icon">📍</span> Выбрать спот
                    <span style="font-size:1rem;">⌵</span>
                </button>
                <!-- выпадающий список спотов -->
                <div class="spots-dropdown" id="spotsDropdown">
                    <ul class="spots-list" id="spotsList">
                        <!-- 10 спотов со ссылками будут вставлены через JS -->
                    </ul>
                </div>
            </div>
        </div>

        {% set current_scale = request.args.get('scale', '12000') %}
    
        <!-- Панель с тремя высотами -->
        <div class="heights-panel">
            <a href="/?scale=3500" class="height-btn {% if current_scale == '3500' %}active{% endif %}">3,5 км</a>
            <a href="/?scale=6000" class="height-btn {% if current_scale == '6000' %}active{% endif %}">6 км</a>
            <a href="/?scale=12000" class="height-btn {% if current_scale == '12000' %}active{% endif %}" data-height="12000">12 км</a>
        </div>

        <div class="text-blocks">
        
            <div id="skewt-container" style="display: inline-block;"></div>
            <script type="module" src="{{ url_for('static', filename='js/skrew-t.js')}}"></script>

            <div id="wind-container" style="display: inline-block"></div>
        </div>

        <div class="container">
            <div class="slider-wrapper">
                <input type="range" id="timeSlider" min="0" max="100" step="0.1" value="0">
                <div class="slider-labels" id="sliderLabels"></div>
                <div id="tooltip" class="tooltip" style="display: none;"></div>
                <div class="slider-track-markers" id="trackMarkers"></div>
            </div>
        </div>
        
    </div>

</body>
</html>
